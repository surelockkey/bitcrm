global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'user-service'
    metrics_path: /api/users/metrics
    static_configs:
      - targets: ['host.docker.internal:4001']

  - job_name: 'crm-service'
    metrics_path: /api/crm/metrics
    static_configs:
      - targets: ['host.docker.internal:4002']

  - job_name: 'deal-service'
    metrics_path: /api/deals/metrics
    static_configs:
      - targets: ['host.docker.internal:4003']

  - job_name: 'inventory-service'
    metrics_path: /api/inventory/metrics
    static_configs:
      - targets: ['host.docker.internal:4004']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://host.docker.internal:4001/api/users/health
          - http://host.docker.internal:4002/api/crm/health
          - http://host.docker.internal:4003/api/deals/health
          - http://host.docker.internal:4004/api/inventory/health
          - http://host.docker.internal:4000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
